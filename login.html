<!DOCTYPE html>

    <div class="logo-container">
        <a href="index.html">
        <img src="/Users/sarker.asafuddoula/Downloads/your-inbox/image/logo.png" alt="Logo"></a>

       <!-- content here -->

       <main>
        <div class="background">
            <div class="login-card">
                <h1>Welcome back!</h1>
                <p>Please sign in with your details</p>
    
                <form id="login-form">
                    <input type="email" id="email" placeholder="Email address" name="email" required>
                    <input type="password" id="password" placeholder="Password" name="psw" required>
                    <p id="error-message" style="color:red; font-family: 'Times New Roman', serif;"></p>
    
                    <label class="checkbox">
                        <input type="checkbox" name="remember"> Remember me
                    </label>
    
                    <button type="submit" id="login-btn">Login</button>
                    <p>Don't have an account? 
                        <b><a href="registration.html">Sign up</a></b>
                </form>
            </div>
        </div>
    </main>

     <!-- FOOTER -->
     <footer>
        <div class="footer-logo">
            <a href="index.html">
            <img src="/Users/sarker.asafuddoula/Downloads/your-inbox/image/darklogo.png" alt="Logo"></a>
        </div>

        <div class="footer-social">
            <p>Follow us:</p>
